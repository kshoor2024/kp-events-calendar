name: "Task 1: Weekly Metro Sweep"

on:
  schedule:
    # Friday 9:00 AM PT (16:00 UTC)
    - cron: '0 16 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit, no Slack)'
        type: boolean
        default: false
      force_slack:
        description: 'Force Slack digest'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Check if Wednesday for Slack
        id: check_day
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "3" ] || [ "${{ inputs.force_slack }}" = "true" ]; then
            echo "send_slack=1" >> $GITHUB_OUTPUT
          else
            echo "send_slack=0" >> $GITHUB_OUTPUT
          fi

      - name: Run weekly metro sweep
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SEND_SLACK: ${{ steps.check_day.outputs.send_slack }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: python scripts/scrape.py

      - name: Generate outreach drafts
        if: ${{ !inputs.dry_run }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/outreach.py

      - name: Commit changes
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "kp-events-bot[bot]"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "events: weekly sweep $(date -u +%Y-%m-%d)"
            git push
          fi
