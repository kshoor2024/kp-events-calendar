name: "Task 2: Contact Enrichment"

on:
  schedule:
    # Tuesday 10:00 AM PT (17:00 UTC)
    - cron: '0 17 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run contact enrichment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 -c "
          import csv, os, sys
          sys.path.insert(0, 'scripts')
          from enrich import enrich_event
          from pathlib import Path

          csv_file = Path('data/events_database.csv')
          rows = list(csv.DictReader(open(csv_file)))
          api_key = os.environ.get('ANTHROPIC_API_KEY', '')
          updated = 0

          for row in rows:
              # Only enrich End User events with missing contact info
              if row.get('Type') != 'End User':
                  continue
              if 'Do Not' in row.get('Status', '') or 'ARCHIVED' in row.get('Status', ''):
                  continue
              contact = row.get('Contact Email or IG', '')
              if contact and '@' in contact and not contact.startswith('@'):
                  continue  # Already has email
              url = row.get('Source URL', '')
              if not url:
                  continue

              try:
                  result = enrich_event({'name': row['Event Name'], 'source_url': url}, api_key)
                  enriched = result.get('enriched', {})
                  if enriched.get('email'):
                      row['Contact Email or IG'] = enriched['email']
                      updated += 1
                      print(f'  Enriched: {row[\"Event Name\"]} -> {enriched[\"email\"]}')
                  elif enriched.get('website'):
                      if not row.get('Source URL'):
                          row['Source URL'] = enriched['website']
              except Exception as e:
                  print(f'  Error: {row[\"Event Name\"]}: {e}')

          # Save
          if updated > 0:
              headers = list(rows[0].keys())
              with open(csv_file, 'w', newline='') as f:
                  writer = csv.DictWriter(f, fieldnames=headers)
                  writer.writeheader()
                  writer.writerows(rows)
              print(f'Updated {updated} contacts')
          else:
              print('No new contacts found')

          # Notify Kate
          from notify_kate import notify
          if updated > 0:
              notify('Contact Enrichment', [f'{updated} events now have contact info that were missing before', 'Check the database for updated emails/IG handles'])
          else:
              notify('Contact Enrichment', ['No new contacts found this run — will retry next Tuesday'])
          "

      - name: Commit changes
        run: |
          git config user.name "kp-events-bot[bot]"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "events: contact enrichment $(date -u +%Y-%m-%d)"
            git push
          fi
